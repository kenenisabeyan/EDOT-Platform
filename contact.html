<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | EDOT Platform</title>
  <link rel="stylesheet" href="./css/contact.css">

  <!-- CSS -->
  <!-- <link rel="stylesheet" href="/css/contact.css" /> -->
</head>

<body>

  <section class="contact-section">
    <div class="contact-container">

      <!-- LEFT INFO -->
      <div class="contact-info">
        <h2>Contact EDOT</h2>
        <p>
          Have any questions or ideas?
          The EDOT team is ready to support your learning journey.
        </p>

        <ul>
          <li><strong>📍 Location:</strong> Ethiopia</li>
          <li><strong>📧 Email:</strong> edotplatform@gmail.com</li>
          <li><strong>📞 Phone:</strong> +251 9XX XXX XXX</li>
        </ul>
      </div>

      <!-- RIGHT FORM -->
      <form class="contact-form" id="contactForm">
        <h3>Send a Message</h3>

        <input type="text" id="name" placeholder="Your Name" />
        <input type="email" id="email" placeholder="Your Email" />
        <textarea id="message" placeholder="Your Message"></textarea>

        <button type="submit">Send Message</button>
        <p id="formStatus" class="form-status"></p>
      </form>

    </div>
  </section>

  <!-- JS -->
  <script src="./js/contact.js"></script>
</body>

</html>
